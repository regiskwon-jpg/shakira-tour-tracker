        "x-api-key": key,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true",
      },
      body: JSON.stringify({model:"claude-sonnet-4-6", max_tokens:1000, system, messages}),
    });
    return res.json();
  }

    if (!newEmail.rawText.trim()) return;
    setParseLoading(true); setParseError("");
    try {

        [{ role:"user", content:`Email subject: ${newEmail.subject}\n\nEmail body:\n${newEmail.rawText}` }],

{"summary":"2-3 sentence summary in English","summaryZh":"2-3句中文摘要","category":"one of: Offer / Deal | Legal / Binder | Due Diligence | Venue / Consent | Marketing | Logistics | Payment | Regulatory | Timeline","categoryZh":"对应中文类别","tags":["3-5 short tags"],"actionItems":[{"text":"action in English","textZh":"中文行动项","owner":"responsible party","due":"deadline or TBD","status":"open"}]}`

                        ))}
                        <span style={{ fontSize:11, marginLeft:"auto", color:"#5a5040" }}>
                          {email.actionItems.length} {isZh?"项":"action"}{!isZh && email.actionItems.length!==1?"s":""} · {email.actionItems.filter(a=>a.status==="done").length} {isZh?"已完成":"done"}
                        </span>
                      </div>
                    </div>
                    <span style={{ color:"#5a5040", fontSize:14 }}>{expandedEmail===email.id?"▲":"▼"}</span>
                  </div>
                </div>

                {expandedEmail === email.id && (
                  <div style={{ borderTop:"1px solid #1a1a0a", padding:"12px 18px 16px" }} className="fade-in">
                    <div style={S.sectionTitle}>{t.actionItems}</div>
                    {email.actionItems.map(action => (
                      <div key={action.id} style={S.actionRow}>
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:13, color:action.status==="done"?"#4a6040":"#d0c8b0", textDecoration:action.status==="done"?"line-through":"none" }}>
                            {getActionText(action)}
                          </div>
                          <div style={{ fontSize:11, color:"#5a5040", marginTop:3 }}>👤 {action.owner} · 📅 {action.due}</div>
                        </div>
                        <StatusSelect status={action.status} onChange={s => updateActionStatus(email.id, action.id, s)} />
                      </div>
                    ))}

                    {addingActionTo === email.id ? (
                      <AddActionForm emailId={email.id} lang={lang}
                        onSave={(data) => saveNewAction(email.id, data)}
                        onCancel={() => setAddingActionTo(null)} />
                    ) : (
                      <button onClick={(e) => { e.stopPropagation(); setAddingActionTo(email.id); }}
                        style={{ marginTop:8, padding:"6px 14px", borderRadius:6, fontSize:12, fontWeight:600,
                          background:"transparent", border:"1px dashed #3a3a20", color:"#7a6a50", cursor:"pointer" }}>
                        {t.addAction}
                      </button>
                    )}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {/* ACTIONS */}
        {view === "actions" && (
          <div className="fade-in">
            {["blocked","open","in-progress","done"].map(status => {
              const items = allActions.filter(a => a.status === status);
              if (!items.length) return null;
              return (
                <div key={status} style={{ marginBottom:24 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                    <span style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.15em", fontWeight:800, color:STATUS_LABEL_COLORS[status] }}>
                      {getStatusLabel(status)}
                    </span>
                    <span style={{ fontSize:11, color:"#5a5040" }}>({items.length})</span>
                  </div>
                  {items.map(a => (
                    <div key={a.id} style={{ ...S.actionRow, background:"#0f0f0a", border:"1px solid #1a1a0a" }}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:13, color:status==="done"?"#4a6040":"#d0c8b0", textDecoration:status==="done"?"line-through":"none" }}>
                          {getActionText(a)}
                        </div>
                        <div style={{ fontSize:11, color:"#5a5040", marginTop:4 }}>
                          👤 {a.owner} · 📅 {a.due} · <span style={{ color:"#7a6a50" }}>📧 {a.emailSubject}</span>
                        </div>
                      </div>
                      <StatusSelect status={a.status} onChange={s => updateActionStatus(a.emailId, a.id, s)} />
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        )}

        {/* ADD EMAIL */}
        {view === "add" && (
          <div style={{ maxWidth:700 }} className="fade-in">
            <div style={{ fontSize:13, color:"#7a6a50", marginBottom:18 }}>
              {t.addEmailNote}
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
              {[
                { key:"date", label:t.date, type:"date" },
                { key:"from", label:t.from, type:"text", placeholder:"Name <email@example.com>" },
                { key:"to", label:t.to, type:"text", placeholder:"Name <email@example.com>" },
                { key:"subject", label:t.subject, type:"text", placeholder:"Email subject line" },
              ].map(({ key, label, type, placeholder="" }) => (
                <div key={key}>
                  <label style={S.label}>{label}</label>
                  <input type={type} placeholder={placeholder} value={newEmail[key]}
                    onChange={e => setNewEmail(p => ({ ...p, [key]:e.target.value }))}
                    style={S.input} />
                </div>
              ))}
              <div>
                <label style={S.label}>{t.emailBody}</label>
                <textarea rows={8} placeholder={t.emailBodyPlaceholder} value={newEmail.rawText}
                  onChange={e => setNewEmail(p => ({ ...p, rawText:e.target.value }))}
                  style={{ ...S.input, resize:"vertical" }} />
              </div>
              {parseError && <div style={{ fontSize:12, color:"#f87171" }}>{parseError}</div>}
              <button onClick={parseEmailWithAI} disabled={parseLoading || !newEmail.rawText.trim()}
                style={{ padding:"11px 24px", borderRadius:7, fontWeight:700, fontSize:14,
                  cursor:parseLoading?"wait":"pointer",
                  background:parseLoading?"#3a3a18":"#c9a227",
                  color:"#0a0a0f", border:"none", opacity:!newEmail.rawText.trim()?0.5:1 }}>
                {parseLoading ? t.parsing : t.parseBtn}
              </button>
            </div>
          </div>
        )}

        {/* ASK AI */}
        {view === "ai" && (
          <div style={{ maxWidth:700 }} className="fade-in">
            <div style={{ fontSize:13, color:"#7a6a50", marginBottom:14 }}>
              {t.askNote}
            </div>
            <div style={{ display:"flex", gap:8, marginBottom:14 }}>
              <input value={aiInput} onChange={e => setAiInput(e.target.value)}
                onKeyDown={e => e.key==="Enter" && !e.shiftKey && askAI()}
                placeholder={t.quickPrompts[0]}
                style={{ ...S.input, flex:1 }} />
              <button onClick={askAI} disabled={aiLoading || !aiInput.trim()}
                style={{ padding:"10px 18px", borderRadius:7, fontWeight:700, fontSize:13,
                  cursor:aiLoading?"wait":"pointer",
                  background:aiLoading?"#3a3a18":"#c9a227",
                  color:"#0a0a0f", border:"none" }}>
                {aiLoading ? t.asking : t.askBtn}
              </button>
            </div>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:18 }}>
              {t.quickPrompts.map(q => (
                <button key={q} onClick={() => setAiInput(q)} style={S.quickBtn}>{q}</button>
              ))}
            </div>
            {aiResult && (
              <div style={{ background:"#0f0f0a", border:"1px solid #2a2a18", borderRadius:10, padding:"16px 18px", fontSize:13, color:"#c8c0a8", lineHeight:1.7, whiteSpace:"pre-wrap" }} className="fade-in">
                <div style={{ fontSize:10, color:"#5a5040", textTransform:"uppercase", letterSpacing:"0.15em", marginBottom:10, fontWeight:700 }}>{t.aiLabel}</div>
                {aiResult}
              </div>
            )}
          </div>
        )}


        {/* API Key Modal */}
        {showKeyModal && (
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
            <div style={{background:"#12120a",border:"1px solid #c9a227",borderRadius:12,padding:24,maxWidth:400,width:"100%"}} className="fade-in">
              <div style={{fontSize:16,fontWeight:800,color:"#c9a227",marginBottom:8}}>🔑 {isZh?"设置 Anthropic API 密钥":"Set Anthropic API Key"}</div>
              <div style={{fontSize:12,color:"#7a6a50",marginBottom:16,lineHeight:1.6}}>
                {isZh
                  ? "请输入您的Anthropic API密钥以启用AI解析和问询功能。密钥仅存储在本次浏览器会话中，关闭浏览器后自动清除。"
                  : "Enter your Anthropic API key to enable AI features (Parse Email & Ask AI). Stored only for this browser session — cleared when you close the tab."}
              </div>
              <input type="password" placeholder="sk-ant-api03-..."
                value={apiKey}
                onChange={e => setApiKey(e.target.value)}
                style={{width:"100%",background:"#0a0a0f",border:"1px solid #3a3a28",borderRadius:6,padding:"10px 12px",color:"#e8e6e0",fontSize:13,marginBottom:12}}
              />
              <div style={{display:"flex",gap:8}}>
                <button onClick={() => {
                  if (manualKey.trim()) {
                    sessionStorage.setItem("ANTHROPIC_KEY", manualKey.trim());
                    setApiKey(manualKey.trim());
                    setShowKeyModal(false);
                  }
                }} style={{flex:1,padding:"10px",borderRadius:7,background:"#c9a227",color:"#0a0a0f",border:"none",fontWeight:800,fontSize:13,cursor:"pointer"}}>
                  {isZh?"保存并继续":"Save & Continue"}
                </button>
                <button onClick={() => setShowKeyModal(false)}
                  style={{padding:"10px 16px",borderRadius:7,background:"#1a1a12",color:"#7a6a50",border:"1px solid #2a2a18",fontSize:13,cursor:"pointer"}}>
                  {isZh?"取消":"Cancel"}
                </button>
              </div>
              <div style={{fontSize:10,color:"#3a3a28",marginTop:12,lineHeight:1.5}}>
                {isZh?"获取密钥：console.anthropic.com → API Keys":"Get your key at console.anthropic.com → API Keys"}
              </div>
            </div>
          </div>
        )}
        <div style={{ height:48 }} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
