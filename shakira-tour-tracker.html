<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shakira 2026 China Tour — Operations Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; color: #e8e6e0; font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
  select option { background: #1a1a12; color: #e8e6e0; }
  input, textarea, select { outline: none; }
  ::-webkit-scrollbar { width: 6px; } 
  ::-webkit-scrollbar-track { background: #0a0a0f; }
  ::-webkit-scrollbar-thumb { background: #2a2a18; border-radius: 3px; }
  .fade-in { animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

const SEED_EMAILS = [
  {
    id: 1,

    from: "Regis Kwong <regis@scottibroasia.com>",

    tags: ["BAFO", "Financial", "Structure"],
    actionItems: [

    ],
  },
  {

    tags: ["Binder", "Legal", "WME LDN"],
    actionItems: [

      { id: "a4", text: "Scotti Bros Asia to sign and return binder letter", owner: "Scotti Bros Asia / Anthony Scotti", due: "TBD", status: "open" },
      { id: "a5", text: "Wire binder payment to WME LDN bank account per wire instructions", owner: "Scotti Bros Asia", due: "TBD", status: "open" },

  },
  {
    id: 3,
    date: "2026-05-31",
    from: "WME Compliance <compliance@wmeagency.com>",

    summary: "WME due diligence form completed. Artist: Shakira Isabel Mebarak Ripoll. Dates: Dec 12-13 (Shanghai Stadium) & Dec 19-20 (Guangzhou Nansha Center). Party 1: Scotti Bros Asia LLC (Promoter, Anthony Scotti). Party 2: Shanghai Jiushi Entertainments (Co-Promoter, Xia Qing). Party 3: Shanghai Magic Live Entertainment Co. Ltd. (Tour Execution, Gao Hong Qi). Jiushi confirmed as state-owned venue owner. Bank: JP Morgan Chase, Scotti Bros Asia LLC, Acct 515694662, Routing 322271627.",
    tags: ["Due Diligence", "KYC", "Compliance"],
    actionItems: [
      { id: "a6", text: "WME to review and initial due diligence form", owner: "WME Booking Agent", due: "TBD", status: "open" },
      { id: "a7", text: "Confirm government/state ownership disclosure for Jiushi (venue)", owner: "Scotti Bros Asia", due: "TBD", status: "done" },
      { id: "a8", text: "Provide EIN for Scotti Bros Asia bank account (left blank on form)", owner: "Scotti Bros Asia", due: "TBD", status: "open" },
      { id: "a9", text: "Add Party 4 bank details if additional remitting banks are involved", owner: "Scotti Bros Asia", due: "TBD", status: "open" },
    ],
  },
  {
    id: 4,
    date: "2026-05-15",
    from: "Shanghai Magic Live <gaohongqi@magiclivent.com>",
    to: "Shanghai Stadium Management",
    subject: "Artist Consent Letter – Shakira / Shanghai Stadium (Dec 12-13, 2026)",
    category: "Venue / Consent",
    summary: "Shakira consent letter for Shanghai Stadium dated Dec 12 & 13, 2026. Issued by Shanghai Magic Live Entertainment Co. Ltd. for venue booking and reservation purposes only. Artist signature and date fields remain blank — pending Shakira execution.",
    tags: ["Consent Letter", "Venue Hold", "Shanghai"],
    actionItems: [
      { id: "a10", text: "Shakira to sign and date Shanghai consent letter", owner: "Shakira / WME", due: "TBD", status: "open" },
      { id: "a11", text: "Return executed consent letter to Shanghai Stadium management", owner: "Shanghai Magic Live", due: "TBD", status: "open" },
    ],
  },
  {
    id: 5,
    date: "2026-05-15",
    from: "Shanghai Magic Live <gaohongqi@magiclivent.com>",
    to: "Guangzhou Nansha Center Management",
    subject: "Artist Consent Letter – Shakira / Guangzhou Nansha (Dec 19-20, 2026)",
    category: "Venue / Consent",
    summary: "Shakira consent letter for Greater Bay Area Culture & Sports Center, Guangzhou, dated Dec 19 & 20, 2026. Issued by Shanghai Magic Live Entertainment Co. Ltd. for venue booking purposes. Artist signature and date fields remain blank — pending Shakira execution.",
    tags: ["Consent Letter", "Venue Hold", "Guangzhou"],
    actionItems: [
      { id: "a12", text: "Shakira to sign and date Guangzhou consent letter", owner: "Shakira / WME", due: "TBD", status: "open" },
      { id: "a13", text: "Return executed consent letter to Guangzhou Nansha Center", owner: "Shanghai Magic Live", due: "TBD", status: "open" },
    ],
  },
  {
    id: 6,
    date: "2026-05-20",
    from: "Heat Wave Culture <marketing@heatwaveculture.com>",
    to: "Scotti Bros Asia <regis@scottibroasia.com>",
    subject: "Master Marketing & Promotional Plan – Shakira China Tour 2026",
    category: "Marketing",
    summary: "3-phase marketing framework submitted. Phase 1 (Buzz): Weibo hashtags, NetEase Cloud Music banner takeovers. Phase 2 (On-Sale): Douyin viral trends, Xiaohongshu, exclusive artist ID video on Damai/Maoyan & Ticketmaster, pre-sale window. Phase 3 (Run-Up): SMG billboards & radio, geo-fenced ads, travel-hub integrations. Budget: 35% Douyin/Weibo/Red Note, 25% SMG Outdoor, 15% NetEase, 15% International, 10% Ticketing. P&L target: break even within 72hrs of on-sale.",
    tags: ["Marketing", "Digital", "SMG"],
    actionItems: [
      { id: "a14", text: "Lock specific line-item dollar budget amounts for each phase", owner: "Heat Wave Culture / Scotti Bros Asia", due: "TBD", status: "open" },
      { id: "a15", text: "Obtain artist ID video recording from Shakira for Phase 2 on-sale push", owner: "WME / Shakira Team", due: "TBD", status: "open" },
      { id: "a16", text: "Activate Weibo verified account and official hashtags (Phase 1)", owner: "Heat Wave Culture", due: "TBD", status: "open" },
      { id: "a17", text: "Coordinate SMG billboard and Dragon TV broadcast buy (Phase 3)", owner: "SMG / Heat Wave Culture", due: "TBD", status: "open" },
    ],
  },
];

const CATEGORIES = ["All","Offer / Deal","Legal / Binder","Due Diligence","Venue / Consent","Marketing","Logistics","Payment","Regulatory"];
const STATUS_OPTIONS = ["open","in-progress","done","blocked"];

const STATUS_STYLES = {
  open:         { background:"#3a1010", color:"#f87171", border:"1px solid #7a2020" },
  "in-progress":{ background:"#3a2e00", color:"#fbbf24", border:"1px solid #7a5c00" },
  done:         { background:"#0a2a10", color:"#4ade80", border:"1px solid #1a5a20" },
  blocked:      { background:"#3a1a00", color:"#fb923c", border:"1px solid #7a3a00" },
};

const STATUS_LABEL_COLORS = {
  open: "#f87171", "in-progress": "#fbbf24", done: "#4ade80", blocked: "#fb923c"
};

function StatusSelect({ status, onChange }) {
  return (
    <select
      value={status}
      onChange={e => onChange(e.target.value)}
      style={{
        ...STATUS_STYLES[status],
        fontSize: 11, padding: "3px 8px", borderRadius: 5,
        cursor: "pointer", fontWeight: 700, textTransform: "uppercase",
        letterSpacing: "0.05em", appearance: "none", WebkitAppearance: "none",
      }}
    >
      {STATUS_OPTIONS.map(s => <option key={s} value={s}>{s}</option>)}
    </select>
  );
}

function App() {
  const [emails, setEmails] = useState(SEED_EMAILS);
  const [activeCategory, setActiveCategory] = useState("All");
  const [expandedEmail, setExpandedEmail] = useState(null);
  const [view, setView] = useState("emails");
  const [aiInput, setAiInput] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [aiResult, setAiResult] = useState(null);
  const [newEmail, setNewEmail] = useState({ date:"", from:"", to:"", subject:"", rawText:"" });
  const [parseLoading, setParseLoading] = useState(false);
  const [parseError, setParseError] = useState("");
  const [apiKey, setApiKey] = useState("");
  const [showKeyInput, setShowKeyInput] = useState(false);

  const filtered = activeCategory === "All" ? emails : emails.filter(e => e.category === activeCategory);
  const allActions = emails.flatMap(e => e.actionItems.map(a => ({ ...a, emailId: e.id, emailSubject: e.subject, emailDate: e.date })));
  const openActions = allActions.filter(a => a.status === "open").length;
  const doneActions = allActions.filter(a => a.status === "done").length;
  const blockedActions = allActions.filter(a => a.status === "blocked").length;
  const inProgressActions = allActions.filter(a => a.status === "in-progress").length;

  function updateActionStatus(emailId, actionId, newStatus) {
    setEmails(prev => prev.map(e =>
      e.id === emailId
        ? { ...e, actionItems: e.actionItems.map(a => a.id === actionId ? { ...a, status: newStatus } : a) }
        : e
    ));
  }

  async function callAPI(messages, system) {
    const headers = { "Content-Type": "application/json" };
    if (apiKey) headers["x-api-key"] = apiKey;
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers,
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, system, messages }),
    });
    return res.json();
  }

  async function parseEmailWithAI() {
    if (!newEmail.rawText.trim()) return;
    setParseLoading(true);
    setParseError("");
    try {
      const data = await callAPI(
        [{ role: "user", content: `Email subject: ${newEmail.subject}\n\nEmail body:\n${newEmail.rawText}` }],
        `You are an assistant for the Shakira 2026 China Tour operations team. Extract structured data and return ONLY valid JSON (no markdown, no backticks):
{"summary":"2-3 sentence summary","category":"one of: Offer / Deal | Legal / Binder | Due Diligence | Venue / Consent | Marketing | Logistics | Payment | Regulatory","tags":["3-5 short tags"],"actionItems":[{"text":"action required","owner":"who is responsible","due":"deadline or TBD","status":"open"}]}`
      );
      const text = (data.content || []).map(b => b.text || "").join("");
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      const newId = Date.now();
      setEmails(prev => [...prev, {
        id: newId,
        date: newEmail.date || new Date().toISOString().split("T")[0],
        from: newEmail.from, to: newEmail.to, subject: newEmail.subject,
        category: parsed.category || "Offer / Deal",
        summary: parsed.summary, tags: parsed.tags || [],
        actionItems: (parsed.actionItems || []).map((a, i) => ({ ...a, id: `ai-${newId}-${i}` })),
      }]);
      setNewEmail({ date:"", from:"", to:"", subject:"", rawText:"" });
      setView("emails");
    } catch(err) {
      setParseError("Could not parse response. Check your API key or try again.");
    }
    setParseLoading(false);
  }

  async function askAI() {
    if (!aiInput.trim()) return;
    setAiLoading(true);
    setAiResult(null);
    const context = JSON.stringify(emails.map(e => ({
      id: e.id, date: e.date, subject: e.subject, category: e.category,
      summary: e.summary, actionItems: e.actionItems
    })));
    try {
      const data = await callAPI(
        [{ role: "user", content: aiInput }],
        `You are the operations analyst for the Shakira 2026 China Tour. Answer concisely and helpfully. Current tracker data: ${context}`
      );
      setAiResult((data.content || []).map(b => b.text || "").join("") || "No response.");
    } catch(err) {
      setAiResult("Error reaching AI. Please check your API key.");
    }
    setAiLoading(false);
    setAiInput("");
  }

  const S = {
    page: { maxWidth: 1100, margin: "0 auto", padding: "0 20px" },
    header: { background: "linear-gradient(135deg,#1a0a00 0%,#0a0a0f 60%)", borderBottom: "1px solid #2a1a00", marginBottom: 0 },
    headerInner: { maxWidth: 1100, margin: "0 auto", padding: "18px 20px 0" },
    nav: { display: "flex", gap: 8, margin: "16px 0" },
    navBtn: (active) => ({
      padding: "7px 16px", borderRadius: 6, fontSize: 13, fontWeight: 600,
      cursor: "pointer", border: "none",
      background: active ? "#c9a227" : "#1a1a12",
      color: active ? "#0a0a0f" : "#9a8a6a",
    }),
    card: { background: "#0f0f0a", border: "1px solid #22220e", borderRadius: 10, overflow: "hidden", marginBottom: 10 },
    label: { fontSize: 11, color: "#7a6a50", textTransform: "uppercase", letterSpacing: "0.1em", fontWeight: 600, marginBottom: 4, display: "block" },
    input: { background: "#0f0f0a", border: "1px solid #2a2a18", borderRadius: 6, padding: "9px 12px", color: "#e8e6e0", fontSize: 13, width: "100%" },
    tag: { fontSize: 10, padding: "2px 8px", borderRadius: 10, background: "#1e1e10", border: "1px solid #3a3a20", color: "#9a8a60", display:"inline-block" },
    statBox: { background: "#12120a", border: "1px solid #2a2a18", borderRadius: 8, padding: "8px 16px", minWidth: 80 },
    filterBtn: (active) => ({
      padding: "4px 12px", borderRadius: 20, fontSize: 11, fontWeight: 600, cursor: "pointer",
      border: active ? "1px solid #c9a227" : "1px solid #2a2a18",
      background: active ? "#c9a22720" : "#12120a",
      color: active ? "#c9a227" : "#7a6a50",
    }),
    actionRow: { display:"flex", gap:12, alignItems:"flex-start", background:"#12120a", borderRadius:7, padding:"10px 14px", border:"1px solid #1e1e10", marginBottom:6 },
    quickBtn: { fontSize:11, padding:"5px 12px", borderRadius:20, border:"1px solid #2a2a18", background:"#12120a", color:"#7a6a50", cursor:"pointer" },
  };

  return (
    <div style={{ background:"#0a0a0f", minHeight:"100vh", color:"#e8e6e0" }}>
      {/* HEADER */}
      <div style={S.header}>
        <div style={S.headerInner}>
          <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:4 }}>
            <div style={{ width:6, height:32, background:"linear-gradient(180deg,#c9a227,#8b6914)", borderRadius:2 }} />
            <div>
              <div style={{ fontSize:10, letterSpacing:"0.2em", color:"#c9a227", textTransform:"uppercase", fontWeight:600 }}>Scotti Bros Asia × WME</div>
              <h1 style={{ fontSize:20, fontWeight:800, color:"#fff", letterSpacing:"-0.02em" }}>Shakira 2026 China Tour — Operations Tracker</h1>
            </div>
            <button onClick={() => setShowKeyInput(!showKeyInput)}
              style={{ marginLeft:"auto", fontSize:11, padding:"5px 12px", borderRadius:6, border:"1px solid #2a2a18", background:"#12120a", color:"#7a6a50", cursor:"pointer" }}>
              {apiKey ? "🔑 Key Set" : "🔑 API Key"}
            </button>
          </div>
          <div style={{ fontSize:11, color:"#7a6a50", paddingLeft:20, paddingBottom:8 }}>Shanghai Dec 12–13 · Guangzhou Dec 19–20 · $20M Gross Guarantee</div>

          {showKeyInput && (
            <div style={{ background:"#12120a", border:"1px solid #2a2a18", borderRadius:8, padding:12, marginBottom:10 }}>
              <div style={{ fontSize:11, color:"#7a6a50", marginBottom:6 }}>Enter your Anthropic API key to enable AI features (Parse Email & Ask AI):</div>
              <div style={{ display:"flex", gap:8 }}>
                <input type="password" placeholder="sk-ant-..." value={apiKey} onChange={e => setApiKey(e.target.value)}
                  style={{ ...S.input, flex:1 }} />
                <button onClick={() => setShowKeyInput(false)}
                  style={{ padding:"9px 14px", borderRadius:6, background:"#c9a227", color:"#0a0a0f", border:"none", fontWeight:700, cursor:"pointer", fontSize:13 }}>Save</button>
              </div>
            </div>
          )}

          {/* Stats */}
          <div style={{ display:"flex", gap:14, flexWrap:"wrap", paddingBottom:14 }}>
            {[
              { label:"Emails", value: emails.length, color:"#c9a227" },
              { label:"Total Actions", value: allActions.length, color:"#e8e6e0" },
              { label:"Open", value: openActions, color:"#f87171" },
              { label:"In Progress", value: inProgressActions, color:"#fbbf24" },
              { label:"Blocked", value: blockedActions, color:"#fb923c" },
              { label:"Done", value: doneActions, color:"#4ade80" },
            ].map(s => (
              <div key={s.label} style={S.statBox}>
                <div style={{ fontSize:20, fontWeight:800, color:s.color }}>{s.value}</div>
                <div style={{ fontSize:10, color:"#7a6a50", textTransform:"uppercase", letterSpacing:"0.1em" }}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* MAIN */}
      <div style={S.page}>
        {/* Nav */}
        <div style={S.nav}>
          {[["emails","📧 Emails"],["actions","✅ Actions"],["add","＋ Log Email"],["ai","✦ Ask AI"]].map(([k,l]) => (
            <button key={k} onClick={() => setView(k)} style={S.navBtn(view === k)}>{l}</button>
          ))}
        </div>

        {/* EMAILS */}
        {view === "emails" && (
          <div>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:14 }}>
              {CATEGORIES.map(c => (
                <button key={c} onClick={() => setActiveCategory(c)} style={S.filterBtn(activeCategory === c)}>{c}</button>
              ))}
            </div>
            {filtered.map(email => (
              <div key={email.id} style={S.card} className="fade-in">
                <div onClick={() => setExpandedEmail(expandedEmail === email.id ? null : email.id)}
                  style={{ padding:"14px 18px", cursor:"pointer" }}>
                  <div style={{ display:"flex", alignItems:"flex-start", gap:10 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:4 }}>
                        <span style={{ fontSize:14, fontWeight:700, color:"#e8e6e0" }}>{email.subject}</span>
                        <span style={{ fontSize:10, padding:"2px 8px", borderRadius:10, background:"#2a2010", color:"#c9a227", fontWeight:600 }}>{email.category}</span>
                      </div>
                      <div style={{ fontSize:11, color:"#5a5040", marginBottom:6 }}>
                        <span style={{ color:"#7a6a50" }}>{email.date}</span> · {email.from}
                      </div>
                      <div style={{ fontSize:12, color:"#8a7a60", lineHeight:1.6 }}>{email.summary}</div>
                      <div style={{ display:"flex", gap:6, marginTop:8, flexWrap:"wrap", alignItems:"center" }}>
                        {email.tags.map(t => <span key={t} style={S.tag}>{t}</span>)}
                        <span style={{ fontSize:11, marginLeft:"auto", color:"#5a5040" }}>
                          {email.actionItems.length} action{email.actionItems.length !== 1 ? "s" : ""} · {email.actionItems.filter(a=>a.status==="done").length} done
                        </span>
                      </div>
                    </div>
                    <span style={{ color:"#5a5040", fontSize:14 }}>{expandedEmail === email.id ? "▲" : "▼"}</span>
                  </div>
                </div>
                {expandedEmail === email.id && (
                  <div style={{ borderTop:"1px solid #1a1a0a", padding:"12px 18px 16px" }} className="fade-in">
                    <div style={{ fontSize:10, textTransform:"uppercase", letterSpacing:"0.15em", color:"#5a5040", marginBottom:10, fontWeight:700 }}>Action Items</div>
                    {email.actionItems.map(action => (
                      <div key={action.id} style={S.actionRow}>
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:13, color: action.status==="done" ? "#4a6040" : "#d0c8b0", textDecoration: action.status==="done" ? "line-through" : "none" }}>
                            {action.text}
                          </div>
                          <div style={{ fontSize:11, color:"#5a5040", marginTop:3 }}>👤 {action.owner} · 📅 {action.due}</div>
                        </div>
                        <StatusSelect status={action.status} onChange={s => updateActionStatus(email.id, action.id, s)} />
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}

        {/* ACTIONS */}
        {view === "actions" && (
          <div>
            {["open","in-progress","blocked","done"].map(status => {
              const items = allActions.filter(a => a.status === status);
              if (!items.length) return null;
              return (
                <div key={status} style={{ marginBottom:24 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                    <span style={{ fontSize:11, textTransform:"uppercase", letterSpacing:"0.15em", fontWeight:800, color: STATUS_LABEL_COLORS[status] }}>{status}</span>
                    <span style={{ fontSize:11, color:"#5a5040" }}>({items.length})</span>
                  </div>
                  {items.map(a => (
                    <div key={a.id} style={{ ...S.actionRow, background:"#0f0f0a", border:"1px solid #1a1a0a" }}>
                      <div style={{ flex:1 }}>
                        <div style={{ fontSize:13, color: status==="done" ? "#4a6040" : "#d0c8b0", textDecoration: status==="done" ? "line-through" : "none" }}>
                          {a.text}
                        </div>
                        <div style={{ fontSize:11, color:"#5a5040", marginTop:4 }}>
                          👤 {a.owner} · 📅 {a.due} · <span style={{ color:"#7a6a50" }}>📧 {a.emailSubject}</span>
                        </div>
                      </div>
                      <StatusSelect status={a.status} onChange={s => updateActionStatus(a.emailId, a.id, s)} />
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        )}

        {/* ADD EMAIL */}
        {view === "add" && (
          <div style={{ maxWidth:700 }}>
            <div style={{ fontSize:13, color:"#7a6a50", marginBottom:18 }}>
              Paste a new email below. AI will auto-extract the summary, category, tags, and action items.
              {!apiKey && <span style={{ color:"#fb923c" }}> — Add your API key (🔑 top right) to enable AI parsing.</span>}
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
              {[
                { key:"date", label:"Date", type:"date" },
                { key:"from", label:"From", type:"text", placeholder:"Name <email@example.com>" },
                { key:"to", label:"To", type:"text", placeholder:"Name <email@example.com>" },
                { key:"subject", label:"Subject", type:"text", placeholder:"Email subject line" },
              ].map(({ key, label, type, placeholder="" }) => (
                <div key={key}>
                  <label style={S.label}>{label}</label>
                  <input type={type} placeholder={placeholder} value={newEmail[key]}
                    onChange={e => setNewEmail(p => ({ ...p, [key]: e.target.value }))}
                    style={S.input} />
                </div>
              ))}
              <div>
                <label style={S.label}>Email Body</label>
                <textarea rows={8} placeholder="Paste the full email body here..." value={newEmail.rawText}
                  onChange={e => setNewEmail(p => ({ ...p, rawText: e.target.value }))}
                  style={{ ...S.input, resize:"vertical" }} />
              </div>
              {parseError && <div style={{ fontSize:12, color:"#f87171" }}>{parseError}</div>}
              <button onClick={parseEmailWithAI} disabled={parseLoading || !newEmail.rawText.trim()}
                style={{ padding:"11px 24px", borderRadius:7, fontWeight:700, fontSize:14,
                  cursor: parseLoading ? "wait" : "pointer",
                  background: parseLoading ? "#3a3a18" : "#c9a227",
                  color:"#0a0a0f", border:"none", opacity: !newEmail.rawText.trim() ? 0.5 : 1 }}>
                {parseLoading ? "Analyzing with AI..." : "✦ Parse & Log Email"}
              </button>
            </div>
          </div>
        )}

        {/* ASK AI */}
        {view === "ai" && (
          <div style={{ maxWidth:700 }}>
            <div style={{ fontSize:13, color:"#7a6a50", marginBottom:14 }}>
              Ask anything about the tour — payments, open actions, deal structure, next steps.
              {!apiKey && <span style={{ color:"#fb923c" }}> — Add your API key (🔑 top right) to enable AI.</span>}
            </div>
            <div style={{ display:"flex", gap:8, marginBottom:14 }}>
              <input value={aiInput} onChange={e => setAiInput(e.target.value)}
                onKeyDown={e => e.key === "Enter" && !e.shiftKey && askAI()}
                placeholder="e.g. What payments are outstanding? Who still needs to sign?"
                style={{ ...S.input, flex:1 }} />
              <button onClick={askAI} disabled={aiLoading || !aiInput.trim()}
                style={{ padding:"10px 18px", borderRadius:7, fontWeight:700, fontSize:13,
                  cursor: aiLoading ? "wait" : "pointer",
                  background: aiLoading ? "#3a3a18" : "#c9a227",
                  color:"#0a0a0f", border:"none" }}>
                {aiLoading ? "..." : "Ask"}
              </button>
            </div>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:18 }}>
              {["What payments are pending?","What are all open actions?","Who needs to sign what?","Summarize the deal structure","What's blocking progress?"].map(q => (
                <button key={q} onClick={() => setAiInput(q)} style={S.quickBtn}>{q}</button>
              ))}
            </div>
            {aiResult && (
              <div style={{ background:"#0f0f0a", border:"1px solid #2a2a18", borderRadius:10, padding:"16px 18px", fontSize:13, color:"#c8c0a8", lineHeight:1.7, whiteSpace:"pre-wrap" }} className="fade-in">
                <div style={{ fontSize:10, color:"#5a5040", textTransform:"uppercase", letterSpacing:"0.15em", marginBottom:10, fontWeight:700 }}>✦ AI Analysis</div>
                {aiResult}
              </div>
            )}
          </div>
        )}

        <div style={{ height:48 }} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
